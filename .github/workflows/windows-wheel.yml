name: Build Windows wheels

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out.
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build Windows ${{ matrix.arch }} wheel
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
            environment_file: dev/pyhwloc_win_dev.yml
            wheel_tag: win_amd64
            with_cuda: "True"
          - arch: arm64
            runner: windows-11-vs2026-arm
            environment_file: dev/pyhwloc_win_arm64_dev.yml
            wheel_tag: win_arm64
            with_cuda: "False"
    steps:
    - uses: actions/checkout@v6.0.3
      with:
        ref: ${{ inputs.ref || github.ref }}

    - uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        miniconda-version: latest
        activate-environment: pyhwloc_dev
        environment-file: ${{ matrix.environment_file }}
        conda-remove-defaults: true

    - name: Build wheel
      shell: pwsh
      run: |
        pip wheel -v . --no-build-isolation --no-deps --wheel-dir dist --config-settings=fetch-hwloc=True --config-settings=with-cuda=${{ matrix.with_cuda }}

    - name: Check wheel tag
      shell: pwsh
      run: |
        $Wheels = @(Get-ChildItem .\dist\pyhwloc-*.whl)
        if ($Wheels.Count -ne 1) {
          throw "Expected exactly one wheel, found $($Wheels.Count)"
        }
        $WheelName = $Wheels[0].Name
        if (-not $WheelName.EndsWith("-${{ matrix.wheel_tag }}.whl")) {
          throw "Expected wheel tag ${{ matrix.wheel_tag }}, got $WheelName"
        }

    - name: Check wheel
      shell: pwsh
      run: |
        python -m pip install --upgrade twine
        python -m twine check (Get-ChildItem .\dist\pyhwloc-*.whl).FullName

    - name: Test wheel import
      shell: pwsh
      run: |
        pip install (Get-ChildItem .\dist\pyhwloc-*.whl).FullName
        python -c "from pyhwloc import Topology"

    - name: Upload wheels
      uses: actions/upload-artifact@v7
      with:
        name: Windows-${{ matrix.arch }}-wheel
        path: dist/pyhwloc-*.whl
        if-no-files-found: error
        retention-days: 7
