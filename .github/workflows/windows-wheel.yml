name: Build Windows wheels

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out.
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-wheels:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        ref: ${{ inputs.ref || github.ref }}

    - uses: dmlc/xgboost-devops/actions/miniforge-setup@main
      with:
        environment-name: pyhwloc_dev
        environment-file: dev/pyhwloc_win_dev.yml

    - name: Build wheel
      shell: pwsh
      run: |
        pip wheel -v . --no-build-isolation --no-deps --wheel-dir dist --config-settings=fetch-hwloc=True

    - name: Check wheel
      shell: pwsh
      run: |
        python -m pip install --upgrade twine
        python -m twine check (Get-ChildItem .\dist\pyhwloc-*.whl).FullName

    - name: Test wheel import
      shell: pwsh
      run: |
        pip install (Get-ChildItem .\dist\pyhwloc-*.whl).FullName
        python -c "from pyhwloc import Topology"

    - name: Upload wheels
      uses: actions/upload-artifact@v7
      with:
        name: Windows-Fat-wheel
        path: dist/pyhwloc-*.whl
        if-no-files-found: error
        retention-days: 7
