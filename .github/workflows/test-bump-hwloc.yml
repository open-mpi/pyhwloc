name: Build and test manylinux_2_34 wheels

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    uses: ./.github/workflows/manylinux-image.yml

  test-wheel:
    needs: build-images
    uses: ./.github/workflows/manylinux-wheel.yml
