name: pyhwloc CI

on:
  push:
    branches:
      - main
      - 'release_*'
  pull_request:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out.
        required: false
        type: string

permissions:
  contents: read  # to fetch code (actions/checkout)
  packages: read  # to fetch the container image

concurrency:
  group: pyhwloc-ci-${{ github.event.pull_request.number || inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Format and Lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        ref: ${{ inputs.ref || github.ref }}
    - uses: dmlc/xgboost-devops/actions/miniforge-setup@main
      with:
        environment-name: pyhwloc_lint
        environment-file: dev/pyhwloc_lint.yml
    - name: Run lint
      shell: bash -l {0}
      run: |
        black --check .
        isort --profile=black --check .
        mypy .

  Linux-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        hwloc: [latest, v2.13.0]
    container:
      image: ghcr.io/open-mpi/pyhwloc:${{ matrix.hwloc }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Trust git cloning project sources
      run: |
        git config --global --add safe.directory "${GITHUB_WORKSPACE}"

    - name: Install hwloc
      shell: bash -l {0}
      run: |
        source activate base
        echo "conda: ${CONDA_PREFIX}"
        echo $(pwd)

        cd /ws/hwloc/
        make install
        cd /ws

    - uses: actions/checkout@v7.0.0
      with:
        ref: ${{ inputs.ref || github.ref }}
    - name: Install pyhwloc editable
      shell: bash -l {0}
      run: |
        source activate base
        echo "conda: ${CONDA_PREFIX}"
        echo $(pwd)

        pip install -e . --no-deps --no-build-isolation
        python -c "from pyhwloc import Topology"
        git clean -xdf
        pip uninstall pyhwloc -y

    - name: Install pyhwloc from sdist
      shell: bash -l {0}
      run: |
        source activate base
        echo "conda: ${CONDA_PREFIX}"
        echo $(pwd)

        python -m build . --sdist
        pip install dist/pyhwloc-*.tar.gz --no-build-isolation
        python -c "from pyhwloc import Topology"
        rm -rf ./dist && git clean -xdf
        pip uninstall pyhwloc -y

    - name: Install pyhwloc with wheel
      shell: bash -l {0}
      run: |
        source activate base
        echo "conda: ${CONDA_PREFIX}"
        echo $(pwd)

        pip wheel -v . --no-build-isolation --wheel-dir dist/
        pip install dist/pyhwloc-*.whl
        python -c "from pyhwloc import Topology"
        rm -rf ./dist && git clean -xdf
        pip uninstall pyhwloc -y

    - name: Install pyhwloc with custom hwloc v3
      if: matrix.hwloc == 'latest'
      shell: bash -l {0}
      run: |
        source activate base
        echo "conda: ${CONDA_PREFIX}"
        echo $(pwd)

        pip wheel -v . --config-settings=fetch-hwloc=True --wheel-dir dist/
        pip install dist/pyhwloc-*.whl
        python -c "from pyhwloc import Topology"

        python dev/check_plugins.py

    - name: Install pyhwloc with custom hwloc v2
      if: matrix.hwloc != 'latest'
      shell: bash -l {0}
      run: |
        source activate base
        echo "conda: ${CONDA_PREFIX}"
        echo $(pwd)

        pip wheel -v . --config-settings=fetch-hwloc=True --config-settings=hwloc-v3=False --wheel-dir dist/
        pip install dist/pyhwloc-*.whl
        python -c "from pyhwloc import Topology"

        python dev/check_plugins.py

    - name: Upload binary wheel
      if: matrix.hwloc == 'latest'
      uses: actions/upload-artifact@v7
      with:
        name: Linux-Fat-wheel
        path: dist/pyhwloc-*.whl
        if-no-files-found: error
        retention-days: 7

    - name: Cleanup
      shell: bash -l {0}
      run: |
        git clean -xdf

    - name: Run tests
      shell: bash -l {0}
      run: |
        source activate base
        echo "conda: ${CONDA_PREFIX}"
        echo $(pwd)

        pytest -s -v -rxXs --durations=0 ./tests

    - name: Build document
      if: matrix.hwloc == 'latest'
      shell: bash -l {0}
      run: |
        source activate base
        echo "conda: ${CONDA_PREFIX}"
        echo $(pwd)

        cd docs
        # Path is set by the build_doc_xml.sh script.
        PYHWLOC_XML_PATH=/ws/xml make html

  Windows-Wheel:
    uses: ./.github/workflows/windows-wheel.yml
    permissions:
      contents: read
    with:
      ref: ${{ inputs.ref || github.ref }}

  Windows-Test:
    needs: Windows-Wheel
    name: Windows ${{ matrix.arch }} test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
            setup: conda
            environment_file: dev/pyhwloc_win_dev.yml
            with_cuda: "True"
          - arch: arm64
            runner: windows-11-vs2026-arm
            setup: python
            with_cuda: "False"
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        ref: ${{ inputs.ref || github.ref }}
    - uses: conda-incubator/setup-miniconda@v4.0.1
      if: matrix.setup == 'conda'
      with:
        miniconda-version: latest
        activate-environment: pyhwloc_dev
        environment-file: ${{ matrix.environment_file }}
        conda-remove-defaults: true

    - uses: actions/setup-python@v6.3.0
      if: matrix.setup == 'python'
      with:
        python-version: "3.12"

    - name: Install Python test dependencies
      if: matrix.setup == 'python'
      shell: pwsh
      run: |
        python -m pip install --upgrade pip hatchling packaging pytest pytest-cov

    - name: Download Windows wheel
      uses: actions/download-artifact@v8
      with:
        name: Windows-${{ matrix.arch }}-wheel
        path: dist

    - name: Install pyhwloc from wheel
      shell: pwsh
      run: |
        pip install (Get-ChildItem .\dist\pyhwloc-*.whl).FullName

        python -c "from pyhwloc import Topology"

    - name: Run tests
      shell: pwsh
      run: |
        pytest -s -v .\tests

    - name: Cleanup
      shell: pwsh
      run: |
        pip uninstall pyhwloc -y
        git clean -xdf

    - name: Install hwloc
      shell: pwsh
      run: |
        $Env:HWLOC_VERSION = $(cat ./dev/hwloc_version)
        git clone https://github.com/open-mpi/hwloc.git
        cd hwloc
        git checkout $Env:HWLOC_VERSION

        cd contrib/windows-cmake
        mkdir build
        cd build
        if ("${{ matrix.setup }}" -eq "conda") {
          $HwlocRoot = $Env:CONDA_PREFIX
        } else {
          $HwlocRoot = Join-Path $Env:RUNNER_TEMP "hwloc"
        }
        New-Item -ItemType Directory -Force -Path $HwlocRoot | Out-Null
        "PYHWLOC_HWLOC_ROOT_DIR=$HwlocRoot" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

        cmake .. "-GVisual Studio 18 2026" -DBUILD_SHARED_LIBS=ON -DHWLOC_ENABLE_PLUGINS=ON -DCMAKE_INSTALL_PREFIX="$HwlocRoot"
        cmake --build . --config Release --parallel "$((Get-WmiObject Win32_Processor).NumberOfLogicalProcessors)"
        cmake --install . --config Release

    - name: Install pyhwloc editable
      shell: pwsh
      run: |
        pip install -e . --no-build-isolation --no-deps --config-settings=hwloc-root-dir="$Env:PYHWLOC_HWLOC_ROOT_DIR" --config-settings=with-cuda=${{ matrix.with_cuda }}
        python -c "from pyhwloc import Topology"
        git clean -xdf
        pip uninstall pyhwloc -y

    - name: Install pyhwloc with wheel
      shell: pwsh
      run: |
        pip wheel -v . --no-build-isolation --no-deps --wheel-dir dist --config-settings=hwloc-root-dir="$Env:PYHWLOC_HWLOC_ROOT_DIR" --config-settings=with-cuda=${{ matrix.with_cuda }}
        pip install (Get-ChildItem .\dist\pyhwloc-*.whl).FullName
        python -c "from pyhwloc import Topology"
        git clean -xdf
        pip uninstall pyhwloc -y

  macOS-Test:
    name: macOS ${{ matrix.arch }} test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-15-intel
    steps:
    - uses: actions/checkout@v6.0.3
      with:
        ref: ${{ inputs.ref || github.ref }}

    - uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        miniconda-version: latest
        activate-environment: pyhwloc_dev
        environment-file: dev/pyhwloc_osx_dev.yml
        conda-remove-defaults: true

    - name: Install hwloc
      shell: bash -l {0}
      run: |
        echo "conda: ${CONDA_PREFIX}"
        # macOS has no CUDA, so hwloc is built without nvml and installed into the
        # conda prefix where CMake's find_package(hwloc) can locate it.
        git clone https://github.com/open-mpi/hwloc.git "${RUNNER_TEMP}/hwloc"
        pushd "${RUNNER_TEMP}/hwloc"
        git checkout "$(cat "${GITHUB_WORKSPACE}/dev/hwloc_version")"
        ./autogen.sh
        ./configure --prefix="${CONDA_PREFIX}" --disable-nvml
        make -j"$(sysctl -n hw.ncpu)" install
        popd

    - name: Install pyhwloc editable
      shell: bash -l {0}
      run: |
        echo "conda: ${CONDA_PREFIX}"
        pip install -e . --no-deps --no-build-isolation --config-settings=with-cuda=False
        python -c "from pyhwloc import Topology"
        git clean -xdf
        pip uninstall pyhwloc -y

    - name: Install pyhwloc from sdist
      shell: bash -l {0}
      run: |
        echo "conda: ${CONDA_PREFIX}"
        python -m build . --sdist
        pip install dist/pyhwloc-*.tar.gz --no-build-isolation --config-settings=with-cuda=False
        python -c "from pyhwloc import Topology"
        rm -rf ./dist && git clean -xdf
        pip uninstall pyhwloc -y

    - name: Install pyhwloc with wheel
      shell: bash -l {0}
      run: |
        echo "conda: ${CONDA_PREFIX}"
        pip wheel -v . --no-build-isolation --config-settings=with-cuda=False --wheel-dir dist/
        pip install dist/pyhwloc-*.whl
        python -c "from pyhwloc import Topology"

    - name: Upload binary wheel
      uses: actions/upload-artifact@v7
      with:
        name: macOS-${{ matrix.arch }}-wheel
        path: dist/pyhwloc-*.whl
        if-no-files-found: error
        retention-days: 7

    - name: Run tests
      shell: bash -l {0}
      run: |
        echo "conda: ${CONDA_PREFIX}"
        pytest -s -v -rxXs --durations=0 ./tests

    - name: Cleanup
      shell: bash -l {0}
      run: |
        rm -rf ./dist && git clean -xdf
        pip uninstall pyhwloc -y

    - name: Install pyhwloc with custom hwloc v3
      shell: bash -l {0}
      run: |
        echo "conda: ${CONDA_PREFIX}"
        pip wheel -v . --config-settings=fetch-hwloc=True --config-settings=with-cuda=False --wheel-dir dist/
        pip install dist/pyhwloc-*.whl
        python -c "from pyhwloc import Topology"
